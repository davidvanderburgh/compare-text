name: Build Release Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey v2 portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ahk -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.21/AutoHotkey_2.0.21.zip" -OutFile ahk-v2.zip -UseBasicParsing
          Expand-Archive -Path ahk-v2.zip -DestinationPath ahk -Force

      - name: Download OCR.ahk
        shell: bash
        run: |
          mkdir -p Lib
          curl -sL -o Lib/OCR.ahk "https://raw.githubusercontent.com/Descolada/OCR/main/Lib/OCR.ahk"

      - name: Download Gdip_All.ahk
        shell: bash
        run: |
          curl -sL -o Lib/Gdip_All.ahk "https://raw.githubusercontent.com/buliasz/AHKv2-Gdip/master/Gdip_All.ahk"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build installer
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ISCC.exe installer.iss //DMyAppVersion="$VERSION"

      - name: Upload unsigned artifact
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-unsigned
          path: Output/*.exe

  sign-windows:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_ORGANIZATION_ID != ''
    steps:
      - name: Sign installer via SignPath
        id: sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'compare-text'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ needs.build-windows.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-signed
          path: signed/*.exe

  release:
    needs: [build-windows, sign-windows]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download signed artifact
        if: needs.sign-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-signed
          path: artifacts/windows-installer

      - name: Download unsigned artifact (fallback)
        if: needs.sign-windows.result != 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-unsigned
          path: artifacts/windows-installer

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
